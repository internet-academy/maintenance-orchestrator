name: Autonomous Manager Orchestrator

on:
  schedule:
    - cron: '*/20 * * * *'  # Runs every 20 minutes
  workflow_dispatch:      # Allows manual trigger from GitHub UI

concurrency:
  group: orchestrator-sync
  cancel-in-progress: false # We want each run to finish, but only one at a time

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Orchestrator
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
          BACKLOG_SPACE_ID: ${{ secrets.BACKLOG_SPACE_ID }}
          BACKLOG_PROJECT_ID: "MD_SD"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CHAT_REPORT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_REPORT_WEBHOOK }}
          CHAT_ID_SAURABH: ${{ secrets.CHAT_ID_SAURABH }}
        run: python orchestrator.py
