name: Gemini Agent Orchestrator

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
  workflow_dispatch:      # Manual trigger
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        # Use default token for Org repos, it's more reliable
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-genai holidays

      - name: Run Orchestrator
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CHAT_REPORT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_REPORT_WEBHOOK }}
          GH_USER_SAURABH: "Saurabh-IA"
          GH_USER_RAMAN: "RmnSoni"
          GH_USER_EWAN: "Froggyyyyyyy"
          GH_USER_CHOO: "young-min-choo"
          STATE_GIST_ID: "50a6b0cb6b461053f0aeb5d4d45fad94"
          DRY_RUN: "False"
        run: python3 orchestrator.py
